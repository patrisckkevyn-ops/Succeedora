    <meta name="twitter:card" content="summary" />

    <meta name="twitter:description" content="Create professional resumes, cover letters and organize your job applications with modern templates and smart tools." />
    <link rel="canonical" href="https://succeedora.com/" />
    <link rel="alternate" hreflang="pt-BR" href="https://succeedora.com/pt" />
    <link rel="alternate" hreflang="en" href="https://succeedora.com/en" />
    <link rel="alternate" hreflang="x-default" href="https://succeedora.com/" />
    <title>Succeedora — Professional Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/brand/succeedora-favicon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="assets/brand/succeedora-favicon-192.png" />
    <script>
      document.write(`<link rel="stylesheet" href="${window.location.protocol === "file:" ? "./" : "/"}styles.css" />`);
    </script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script>
      window.addEventListener("load", () => {
        if (window.location.protocol !== "http:" && window.location.protocol !== "https:") return;
        const loadScript = (src) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          document.head.appendChild(script);
        };
        window.requestIdleCallback ? window.requestIdleCallback(() => {
          loadScript("/_vercel/insights/script.js");
          loadScript("/_vercel/speed-insights/script.js");
        }) : window.setTimeout(() => {
          loadScript("/_vercel/insights/script.js");
          loadScript("/_vercel/speed-insights/script.js");
        }, 1200);
      });
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      document.write(`<script src="${window.location.protocol === "file:" ? "./" : "/"}app.js"><\/script>`);
    </script>
  </body>
</html>
