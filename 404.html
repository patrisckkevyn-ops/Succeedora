<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Page not found | Succeedora</title>
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/brand/succeedora-favicon-192.png" />
    <style>
      :root {
        color-scheme: light;
        --ink: #0b1736;
        --muted: #5c6b84;
        --line: rgba(203, 215, 235, 0.86);
        --blue: #123c91;
        --blue-2: #1f69d5;
        --cyan: #69d8f2;
        --purple: #7b61ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(247, 250, 255, 0.98), #ffffff 42%),
          linear-gradient(135deg, rgba(31, 105, 213, 0.1), rgba(155, 124, 247, 0.08));
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 22px clamp(20px, 5vw, 72px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        text-decoration: none;
        font-weight: 900;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 46px;
        height: 46px;
        border-radius: 16px;
        overflow: hidden;
        color: #ffffff;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(239, 247, 255, 0.82));
        box-shadow: 0 14px 30px rgba(18, 60, 145, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.82);
      }

      .brand-logo-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform: scale(0.96);
        filter: drop-shadow(0 8px 14px rgba(31, 105, 213, 0.2));
      }

      .lang {
        display: inline-flex;
        gap: 8px;
      }

      .lang button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 12px;
        color: var(--blue);
        background: rgba(255, 255, 255, 0.82);
        font: inherit;
        font-weight: 850;
        cursor: pointer;
      }

      .lang button[aria-pressed="true"] {
        color: #ffffff;
        background: linear-gradient(135deg, var(--blue), var(--blue-2), var(--purple));
      }

      main {
        display: grid;
        place-items: center;
        padding: 22px clamp(20px, 5vw, 72px) 64px;
      }

      .not-found-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.72fr);
        gap: clamp(24px, 5vw, 58px);
        align-items: center;
        width: min(100%, 1120px);
        padding: clamp(26px, 5vw, 54px);
        border: 1px solid var(--line);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow:
          0 34px 100px rgba(18, 60, 145, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(16px);
      }

      .copy {
        display: grid;
        gap: 18px;
      }

      .code {
        color: var(--blue);
        font-size: clamp(76px, 13vw, 148px);
        line-height: 0.86;
        font-weight: 950;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: clamp(34px, 5vw, 58px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(16px, 1.6vw, 20px);
        line-height: 1.62;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 4px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 20px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 900;
      }

      .button.primary {
        color: #ffffff;
        background: linear-gradient(135deg, var(--blue), var(--blue-2), var(--purple));
        box-shadow: 0 16px 36px rgba(31, 105, 213, 0.28);
      }

      .button.secondary {
        border: 1px solid var(--line);
        color: var(--ink);
        background: rgba(255, 255, 255, 0.88);
      }

      .visual {
        position: relative;
        min-height: 310px;
        border: 1px solid rgba(31, 105, 213, 0.12);
        border-radius: 26px;
        background:
          linear-gradient(145deg, rgba(247, 251, 255, 0.98), rgba(239, 246, 255, 0.92)),
          linear-gradient(135deg, rgba(31, 105, 213, 0.1), rgba(155, 124, 247, 0.08));
        overflow: hidden;
      }

      .document {
        position: absolute;
        inset: 34px 46px 44px 34px;
        display: grid;
        gap: 12px;
        align-content: start;
        padding: 22px;
        border: 1px solid rgba(31, 105, 213, 0.12);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 54px rgba(18, 60, 145, 0.12);
      }

      .document b,
      .document i,
      .document span {
        display: block;
        border-radius: 999px;
      }

      .document b {
        width: 50%;
        height: 16px;
        background: var(--blue);
      }

      .document i {
        height: 10px;
        background: #dbe7f8;
      }

      .document i:nth-of-type(2) {
        width: 74%;
      }

      .document i:nth-of-type(3) {
        width: 58%;
      }

      .document span {
        width: 46%;
        height: 12px;
        margin-top: 18px;
        background: linear-gradient(90deg, var(--blue-2), var(--cyan));
      }

      .break-line {
        position: absolute;
        left: 20%;
        right: 18%;
        top: 52%;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(31, 105, 213, 0.45), transparent);
        transform: rotate(-7deg);
      }

      @media (max-width: 820px) {
        .not-found-card {
          grid-template-columns: 1fr;
        }

        .visual {
          min-height: 250px;
        }
      }

      @media (max-width: 560px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions,
        .button {
          width: 100%;
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --ink: #f8fbff;
          --muted: #b8c5da;
          --line: rgba(120, 150, 210, 0.28);
        }

        body {
          background:
            linear-gradient(180deg, rgba(8, 18, 40, 0.98), rgba(8, 18, 40, 0.94)),
            linear-gradient(135deg, rgba(31, 105, 213, 0.14), rgba(155, 124, 247, 0.12));
        }

        .not-found-card,
        .visual,
        .document,
        .button.secondary,
        .lang button {
          border-color: var(--line);
          background: rgba(16, 27, 52, 0.78);
        }

        .code {
          color: #91e8f8;
        }

        .document i {
          background: rgba(148, 163, 184, 0.24);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <a class="brand" data-home href="/en">
          <span class="brand-mark" aria-hidden="true">
            <img class="brand-logo-image" data-brand-logo src="assets/brand/succeedora-logo-premium-96.png" alt="" width="46" height="46" />
          </span>
          <span>Succeedora</span>
        </a>
        <div class="lang" aria-label="Language">
          <button type="button" data-lang="pt">PT</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </header>
      <main>
        <section class="not-found-card" aria-labelledby="not-found-title">
          <div class="copy">
            <div class="code">404</div>
            <h1 id="not-found-title" data-title>Page not found</h1>
            <p data-subtitle>The link you tried to access may have been moved, removed or typed incorrectly.</p>
            <p data-support>You can return to the homepage, explore resume templates or start creating a professional resume with Succeedora.</p>
            <div class="actions">
              <a class="button secondary" data-home-link href="/en">Back to home</a>
              <a class="button secondary" data-templates-link href="/en/templates">View templates</a>
              <a class="button primary" data-create-link href="/en#/signup">Create resume</a>
            </div>
          </div>
          <div class="visual" aria-hidden="true">
            <div class="document"><b></b><i></i><i></i><i></i><span></span></div>
            <div class="break-line"></div>
          </div>
        </section>
      </main>
    </div>
    <script>
      const copies = {
        pt: {
          lang: "pt-BR",
          title: "P\u00e1gina n\u00e3o encontrada",
          subtitle: "O link que voc\u00ea tentou acessar pode ter sido movido, removido ou digitado incorretamente.",
          support: "Voc\u00ea pode voltar ao in\u00edcio, explorar modelos de curr\u00edculo ou come\u00e7ar a criar um curr\u00edculo profissional na Succeedora.",
          home: "Voltar ao in\u00edcio",
          templates: "Ver modelos",
          create: "Criar curr\u00edculo",
          homeUrl: "/pt",
          templatesUrl: "/pt/modelos",
          createUrl: "/pt#/signup",
          titleTag: "P\u00e1gina n\u00e3o encontrada | Succeedora",
        },
        en: {
          lang: "en",
          title: "Page not found",
          subtitle: "The link you tried to access may have been moved, removed or typed incorrectly.",
          support: "You can return to the homepage, explore resume templates or start creating a professional resume with Succeedora.",
          home: "Back to home",
          templates: "View templates",
          create: "Create resume",
          homeUrl: "/en",
          templatesUrl: "/en/templates",
          createUrl: "/en#/signup",
          titleTag: "Page not found | Succeedora",
        },
      };
      const initialLanguage = location.pathname.split("/").filter(Boolean)[0] === "pt" || (navigator.language || "").toLowerCase().startsWith("pt") ? "pt" : "en";
      const brandLogo = document.querySelector("[data-brand-logo]");
      if (brandLogo) {
        brandLogo.addEventListener("error", () => {
          if (brandLogo.dataset.fallbackTried) return;
          brandLogo.dataset.fallbackTried = "true";
          brandLogo.src = "../assets/brand/succeedora-logo-premium-96.png";
        });
      }

      function applyLanguage(language) {
        const copy = copies[language] || copies.en;
        document.documentElement.lang = copy.lang;
        document.title = copy.titleTag;
        document.querySelector("[data-home]").href = copy.homeUrl;
        document.querySelector("[data-title]").textContent = copy.title;
        document.querySelector("[data-subtitle]").textContent = copy.subtitle;
        document.querySelector("[data-support]").textContent = copy.support;
        document.querySelector("[data-home-link]").textContent = copy.home;
        document.querySelector("[data-home-link]").href = copy.homeUrl;
        document.querySelector("[data-templates-link]").textContent = copy.templates;
        document.querySelector("[data-templates-link]").href = copy.templatesUrl;
        document.querySelector("[data-create-link]").textContent = copy.create;
        document.querySelector("[data-create-link]").href = copy.createUrl;
        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.lang === language));
        });
      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.lang));
      });
      applyLanguage(initialLanguage);
    </script>
  </body>
</html>
